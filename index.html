<!DOCTYPE html>
<html lang="en">
<head>
  <title>Q4 Seatwork 1 Ni Sir Baja Blast</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body {
      background-color: #000000;
      font-family: Arial, sans-serif;
    }

    .btn-primary {
      background-color: #000000;
      border-color: #000000;
      color: white;
    }

    details summary {
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">

  
    <details class="mb-3 mt-3">
      <summary class="btn btn-secondary btn-sm">Show Instructions</summary>
      <div class="alert alert-info mt-2">
        <p>1. Enter your username and password boss</p>
        <p>2. You have 3 bombocclat attempts before the account is locked rasclatttt</p>
        <p>3. username: ruby | password: 12345</p>
      </div>
    </details>


    <div class="card p-4 mx-auto" style="max-width: 400px;">
      <h2 class="text-center mb-3">Login Form</h2>

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter Username">
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter Password">
      </div>

      <button class="btn btn-primary w-100" onclick="login()">Login</button>
    </div>

   
    <p class="text-center mt-4" style="color: white;">
      Sources:
      <a href="https://www.w3schools.com" target="_blank">W3Schools</a> |
      <a href="https://getbootstrap.com" target="_blank">Bootstrap</a>
    </p>

  </div>

  <script>
    
    var C_Username = "ruby";
    var C_Password = "12345";

    
    var attempts = 0;
    var maxAttempts = 3;

    function login() {
      var username = document.getElementById("username").value;
      var password = document.getElementById("password").value;

      if (username === C_Username && password === C_Password) {
        alert("Login Successful");
      } else {
        attempts++;
        alert("Login Failed 🤦🏻‍♂️ Attempts Left: " + (maxAttempts - attempts));
      }

      if (attempts === maxAttempts) {
        alert("Account Locked LOOK AT THE INSTRUCTIONS NGANIIII");
      }
    }
  </script>

</body>
</html>
